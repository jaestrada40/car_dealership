<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos los Repuestos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <header class="bg-gray-900 text-white py-4 px-6 shadow sticky top-0 z-50">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">AutoPrime</h1>
        <a href="index.html" class="hover:underline">Inicio</a>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
      <h2 class="text-2xl font-bold text-center mb-8">Todos los Repuestos</h2>

      <div class="mb-6 flex justify-center">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar por nombre de repuesto"
          class="w-full max-w-md px-4 py-2 border rounded shadow-sm focus:outline-none focus:ring"
        />
      </div>

      <div
        id="partsGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- Repuestos cargados dinámicamente -->
      </div>

      <div id="pagination" class="mt-10 flex justify-center gap-2"></div>
    </main>

    <footer class="bg-gray-900 text-white mt-16">
      <div
        class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400"
      >
        &copy; 2025 AutoPrime. Todos los derechos reservados.
      </div>
    </footer>

    <script src="./js/all_parts.js"></script>
  </body>
</html>
