<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcas - AutoPrime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <!-- Navbar -->
    <header class="bg-gray-900 text-white sticky top-0 z-50 shadow">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <h1 class="text-2xl font-bold">AutoPrime</h1>
        <a href="index.html" class="text-sm hover:text-blue-400">Inicio</a>
      </div>
    </header>

    <!-- Sección de Marcas -->
    <main class="max-w-6xl mx-auto px-4 py-10">
      <h2 class="text-3xl font-bold text-center mb-10">Todas las Marcas</h2>
      <div
        id="brandsGrid"
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"
      >
        <!-- Aquí se cargarán las marcas -->
      </div>
    </main>

    <footer class="bg-gray-900 text-white mt-16">
      <div class="text-center py-6 text-sm">
        © 2025 AutoPrime. Todos los derechos reservados.
      </div>
    </footer>

    <script src="./js/all_brands.js"></script>
  </body>
</html>
